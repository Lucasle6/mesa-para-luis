name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Enables GitHub Pages on this repo automatically (no manual setting needed)
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - run: npm ci

      # Middleware isn't supported in a static export; the root redirect below
      # replaces the locale redirect for the hosted preview.
      - name: Remove middleware for static export
        run: rm -f middleware.ts

      - name: Build static site
        run: npm run build
        env:
          GITHUB_PAGES: 'true'

      - name: Add root redirect + .nojekyll
        run: |
          cat > out/index.html <<'HTML'
          <!doctype html>
          <html lang="es">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <meta http-equiv="refresh" content="0; url=./es/" />
              <link rel="canonical" href="./es/" />
              <title>Mesa para Luis</title>
              <script>location.replace('./es/' + location.search + location.hash)</script>
            </head>
            <body>Redirigiendo a <a href="./es/">/es/</a>…</body>
          </html>
          HTML
          touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
